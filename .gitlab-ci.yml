stages:
  - test
  - build
  - quality
  - docker

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  FRONTEND_DIR: "frontend"
  DOCKER_TLS_CERTDIR: "/certs"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/wrapper
    - .gradle/caches
    - frontend/node_modules/

backend:test:
  stage: test
  image: gradle:9.3.1-jdk17
  script:
    - chmod +x ./gradlew
    - ./gradlew test --no-daemon
  artifacts:
    when: always
    paths:
      - build/reports/tests/test/
      - build/test-results/test/

frontend:build:
  stage: build
  image: node:22-alpine
  script:
    - cd "$FRONTEND_DIR"
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/

sonarqube:
  stage: quality
  image: gradle:9.3.1-jdk17
  script:
    - chmod +x ./gradlew
    - ./gradlew sonarqube --no-daemon -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.token="$SONAR_TOKEN"
  rules:
    - if: '$SONAR_HOST_URL && $SONAR_TOKEN'
      when: on_success
    - when: never

docker:build-and-push:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" .
    - docker build -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" ./frontend
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/backend:latest"
        docker tag "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/frontend:latest"
        docker push "$CI_REGISTRY_IMAGE/backend:latest"
        docker push "$CI_REGISTRY_IMAGE/frontend:latest"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
